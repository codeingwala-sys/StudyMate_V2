<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed black background (maskable needs to fill the whole square) -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Subtle glow -->
  <defs>
    <radialGradient id="mg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#mg)"/>

  <!-- Icon centred with safe-zone padding (~80px each side = 20% safe zone) -->
  <text
    x="256"
    y="320"
    font-size="240"
    font-family="serif"
    text-anchor="middle"
    fill="#60a5fa"
    opacity="0.95"
  >✦</text>
</svg>
